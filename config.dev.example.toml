addr = ":8080"

[display]
blank_after = "20m"

[display.labels]
outside  = "Outside"
inside   = "Inside"
humidity = "Humidity"

[slideshow]
interval   = "30s"
images_dir = "images"

# Sensors, mock only, no hardware required

[[sensor]]
id            = "mock_inside"
type          = "mock"
role          = "inside"
poll_interval = "3s"

[[sensor.mock_reading]]
kind  = "temperature"
value = 22.0
delta = 0.5

[[sensor.mock_reading]]
kind  = "humidity"
value = 48.0
delta = -1.0

[[sensor.mock_reading]]
kind  = "motion"
value = 1.0

# Weather

[weather]
api_key        = ""
lat            = 47.3567
lon            = 19.4485
poll_interval  = "10m"
retry_interval = "30s"
units          = "metric"

# MQTT, disabled in dev unless you point it at a real broker.
# [mqtt]
# broker = "tcp://localhost:1883"
#
# [mqtt.bridge]
# enabled = true
# node_id = "picture_frame_dev"
