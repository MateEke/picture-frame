version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
      include: scope
    groups:
      go-deps:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    commit-message:
      prefix: build
      include: scope
    groups:
      npm-deps:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    commit-message:
      prefix: build
      include: scope
    groups:
      docs-deps:
        patterns: ['*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns: ['*']
