name: Docs

# Builds the docs site and validates every internal link, so broken links and build
# failures are caught before merge. Deployment is handled by Cloudflare Pages, configured
# at the public release (see docs/PLACEHOLDERS.md), not by this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for Starlight's "Last updated" stamps
      - uses: withastro/action@v6
        with:
          path: ./docs
